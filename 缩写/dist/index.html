<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>报价单生成器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Excel 报价工具</p>
            <h1>按销售价格表生成标准报价单</h1>
          </div>
          <div class="status-pill" id="statusPill">读取模板中</div>
        </header>

        <div class="panels">
          <section class="panel">
            <div class="panel-head">
              <span class="step">1</span>
              <div>
                <h2>价格表模板</h2>
                <p>默认读取内置销售价格表，也可以上传新的 .xls、.xlsx 或 .xlsm 文件。</p>
              </div>
            </div>
            <label class="template-box">
              <span class="upload-icon">+</span>
              <strong id="fileName">5.21 销售价格表</strong>
              <small>点击此处更换价格表文件；不上传则使用内置模板。</small>
              <input id="templateInput" type="file" accept=".xls,.xlsx,.xlsm" />
            </label>
            <div class="meta-grid" id="metaGrid">
              <div>
                <span>价格表</span>
                <strong id="sheetName">-</strong>
              </div>
              <div>
                <span>产品数量</span>
                <strong id="productCount">-</strong>
              </div>
              <div>
                <span>报价模板</span>
                <strong id="quoteSheetName">-</strong>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <span class="step">2</span>
              <div>
                <h2>输入需要报价的产品</h2>
                <p>每行一个产品，支持缩写、全称、规格和数量，例如 MS40*2 或 WA10 x 3。</p>
              </div>
            </div>
            <textarea id="productInput" placeholder="例如：&#10;MS40*2&#10;RT30&#10;Retatrutide | 30mg*10vials&#10;WA10 x 3"></textarea>
            <div class="actions">
              <button id="previewButton" type="button" class="secondary">预览匹配</button>
              <button id="generateButton" type="button">生成并下载 Excel</button>
            </div>
          </section>
        </div>

        <section class="results" id="results">
          <div class="result-column">
            <h3>已匹配</h3>
            <ul id="matchedList"></ul>
          </div>
          <div class="result-column">
            <h3>未匹配</h3>
            <ul id="missingList"></ul>
          </div>
        </section>

        <footer class="note">
          程序会按价格表匹配产品，并写入报价模板的输入区。导出的 Excel 会尽量保留原模板的表格格式、公式、列宽、行高和合并单元格。
        </footer>
      </section>
    </main>

    <script src="./assets/xlsx.full.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
